name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'      # 1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+'     # v1.0.0

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> $GITHUB_OUTPUT
          echo "version=$VERSION"  >> $GITHUB_OUTPUT

      - name: Stamp version into package.json
        run: |
          npm version "${{ steps.ver.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Build macOS (x64 + arm64)
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build artifacts
        run: ls -lh dist/

      - name: Delete existing release if present
        run: |
          gh release delete "v${{ steps.ver.outputs.version }}" --yes --cleanup-tag || true
          gh release delete "${{ steps.ver.outputs.tag }}"      --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and upload artifacts
        run: |
          V_TAG="v${{ steps.ver.outputs.version }}"
          # Ensure the v-prefixed tag exists
          git tag "$V_TAG" || true
          git push origin "$V_TAG" || true
          # Create release and upload all dist artifacts in one command
          gh release create "$V_TAG" \
            --title "Diff App ${{ steps.ver.outputs.version }}" \
            --notes "Release ${{ steps.ver.outputs.version }}" \
            dist/*.dmg \
            dist/*.zip \
            dist/*.blockmap \
            dist/latest-mac.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
