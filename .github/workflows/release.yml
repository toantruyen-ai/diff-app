name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'      # 1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+'     # v1.0.0

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> $GITHUB_OUTPUT
          echo "version=$VERSION"  >> $GITHUB_OUTPUT

      - name: Stamp version into package.json
        run: |
          npm version "${{ steps.ver.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version

      - name: Ensure v-prefixed tag exists for electron-builder
        run: |
          V_TAG="v${{ steps.ver.outputs.version }}"
          CURRENT_TAG="${{ steps.ver.outputs.tag }}"
          if [ "$CURRENT_TAG" != "$V_TAG" ]; then
            git tag "$V_TAG" || true
            git push origin "$V_TAG" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing release if present
        run: |
          gh release delete "v${{ steps.ver.outputs.version }}" --yes || true
          gh release delete "${{ steps.ver.outputs.tag }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS (x64 + arm64)
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
